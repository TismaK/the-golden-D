<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indice</title>

  <style>

    .texte-indice {
  text-align: center;
  color: white;
  padding: 20px;
}

.indice {
  font-size: 2em;
  margin-top: 10px;
}
    
    body {
      margin: 0;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    }

    /* IMAGE */
    #content img {
      display: block;
      width: 100%;
      height: auto;
      margin: auto;
    }

    /* FLOU */
    #content {
      filter: blur(8px);
      transition: 0.3s;
    }

    /* POPUP */
    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .popup-box {
      background: #2a2a40;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: white;
    }

    input {
      padding: 10px;
      width: 80%;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #ffcc00;
      font-weight: bold;
      cursor: pointer;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    /* SHAKE */
    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    .shake {
      animation: shake 0.4s;
    }

    /* CONFETTIS */
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      top: 0;
      opacity: 0.8;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>
  
<!-- IMAGE + TEXTE FLOUTÉS -->
<div id="content">
  <img src="Indice7.jpg" alt="Indice">

  <div class="texte-indice">
    <h1>👏 Bravo ! 👏</h1>
    <p>Voici le 7ème indice :</p>
    <p class="indice">CULTE</p>
  </div>
</div>
  
  <!-- POPUP -->
  <div id="popup">
    <div class="popup-box">
      <h2>🔑 Accès requis</h2>
      <p>Entre le mot de passe :</p>

      <input type="text" id="password" placeholder="Mot de passe"
        onkeypress="if(event.key==='Enter') checkPassword()">
      <br>
      <button onclick="checkPassword()">Valider</button>

      <div id="error" class="error"></div>
    </div>
  </div>

  <script>
    const correctPassword = "dujardin"; // 🔥 change ici

    function checkPassword() {
      const input = document.getElementById("password").value.trim().toLowerCase();
      const popupBox = document.querySelector(".popup-box");

      if (input === correctPassword) {

        // 🎉 Confettis
        for (let i = 0; i < 80; i++) {
          const confetti = document.createElement("div");
          confetti.classList.add("confetti");

          confetti.style.left = Math.random() * 100 + "vw";
          confetti.style.backgroundColor = `hsl(${Math.random()*360}, 100%, 50%)`;
          confetti.style.animationDuration = (Math.random() * 2 + 2) + "s";

          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 3000);
        }

        // 🔓 Déblocage
        setTimeout(() => {
          document.getElementById("content").style.filter = "blur(0)";
          document.getElementById("popup").style.display = "none";
        }, 500);

      } else {

        popupBox.classList.add("shake");

        setTimeout(() => {
          popupBox.classList.remove("shake");
        }, 400);

        document.getElementById("error").innerText = "Mot de passe incorrect";
      }
    }
  </script>

</body>
</html>
